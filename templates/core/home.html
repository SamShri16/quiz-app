{% extends 'base.html' %}

{% block content %}
<h2>All Quizzes</h2>

<ul class="list-group">
    {% for quiz in quizzes %}
        <li class="list-group-item">
            {{ quiz.title }}
        </li>
    {% empty %}
        <li class="list-group-item">No quizzes available.</li>
    {% endfor %}
</ul>
{% endblock %}
