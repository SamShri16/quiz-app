{% extends 'core/base.html' %}

{% block content %}

<h2>My Quiz Attempts</h2>

{% if attempts %}
<table class="table">
    <tr>
        <th>Quiz</th>
        <th>Score</th>
        <th>Date</th>
    </tr>

    {% for attempt in attempts %}
    <tr>
        <td>{{ attempt.quiz.title }}</td>
        <td>{{ attempt.score }}/{{ attempt.total }}</td>
        <td>{{ attempt.completed_at }}</td>
    </tr>
    {% endfor %}
</table>

{% else %}
<p>No attempts yet.</p>
{% endif %}

{% endblock %}
