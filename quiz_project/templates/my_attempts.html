<!DOCTYPE html>
<html>
<head>
    <title>My Attempts</title>
</head>
<body>

    <h1>My Quiz Attempts</h1>

    {% if attempts %}
        <ul>
            {% for attempt in attempts %}
                <li>
                    Score: {{ attempt.score }} |
                    Completed At: {{ attempt.completed_at }}
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No attempts yet.</p>
    {% endif %}

    <br>
    <a href="/">Go Home</a>

</body>
</html>
